# Literature intelligence configuration
database:
  url: "sqlite:///data/literature.db"  # Override with LITERATURE_DB_URL env var

pubmed:
  api_key: null  # Override with NCBI_API_KEY env var
  email: null    # Override with NCBI_EMAIL env var
  max_results: 100

biorxiv:
  base_url: "https://api.biorxiv.org/details/biorxiv"
  max_results: 100

search_queries:
  - "brain organoid morphogen differentiation"
  - "neural organoid protocol optimization"
  - "Bayesian optimization cell culture"
  - "single cell RNA-seq organoid fidelity"
  - "morphogen screen neural patterning"

deduplication:
  title_similarity_threshold: 0.9  # Levenshtein ratio
